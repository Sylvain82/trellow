<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trellow BT</title>
<style>
:root{
  --bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  --column-bg: rgba(255,255,255,0.08);
  --column-border: rgba(255,255,255,0.12);
  --card:#ffffff;
  --card-text:#333;
  --card-muted:#777;
  --card-border:#eee;
  --primary:#4f8cff;
  --primary-hover:#3a7ae8;
  --danger:#ff5c5c;
  --success:#2ecc71;
  --warning:#f39c12;
  --radius:14px;
  --shadow:0 10px 30px rgba(0,0,0,.25);
  --modal-bg:#ffffff;
  --modal-text:#333;
  --input-bg:#f8f9fa;
  --input-border:#ddd;
  --comment-bg:#f4f5f7;
  --header-bg:rgba(0,0,0,.35);
  --text-on-dark:white;
  --overlay:rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg: linear-gradient(135deg,#e8edf2,#dce3ea,#cdd8e4);
  --column-bg: rgba(0,0,0,0.04);
  --column-border: rgba(0,0,0,0.1);
  --header-bg:rgba(255,255,255,.85);
  --text-on-dark:#1a1a2e;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --overlay:rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--text-on-dark);min-height:100vh;}

/* === HEADER === */
header{backdrop-filter:blur(12px);background:var(--header-bg);padding:12px 20px;font-size:18px;font-weight:600;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(128,128,128,.15);position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#header-user{font-size:12px;opacity:.7;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* === SEARCH / FILTERS === */
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;flex-wrap:wrap;background:rgba(128,128,128,.05);border-bottom:1px solid rgba(128,128,128,.08);}
.toolbar input[type="text"],.toolbar select{background:rgba(128,128,128,.12);border:1px solid rgba(128,128,128,.15);color:var(--text-on-dark);padding:7px 12px;border-radius:8px;font-size:13px;outline:none;transition:.2s;}
.toolbar input[type="text"]:focus,.toolbar select:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,140,255,.2);}
.toolbar input[type="text"]{width:200px;}
.toolbar select{min-width:100px;}
.toolbar label{font-size:12px;font-weight:500;opacity:.7;}
.filter-group{display:flex;align-items:center;gap:6px;}

/* === BOARD === */
.board{display:flex;gap:18px;padding:20px;overflow-x:auto;flex:1;align-items:flex-start;}
.board::-webkit-scrollbar{height:8px;}
.board::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25);border-radius:999px;}
.board-footer{padding:12px 20px;}

/* === COLUMNS === */
.column{background:var(--column-bg);border:1px solid var(--column-border);width:310px;min-width:310px;border-radius:var(--radius);padding:12px;flex-shrink:0;backdrop-filter:blur(8px);box-shadow:var(--shadow);transition:.2s ease;}
.col-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.col-header input{flex:1;border:none;background:transparent;font-weight:600;font-size:15px;padding:4px 6px;color:var(--text-on-dark);border-radius:6px;}
.col-header input:focus{outline:none;background:rgba(128,128,128,.1);}
.card-counter{background:rgba(128,128,128,.2);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;min-width:22px;text-align:center;}
.wip-warning{background:var(--danger);color:white;animation:pulse-wip 1.5s infinite alternate;}
@keyframes pulse-wip{from{opacity:.8}to{opacity:1}}
.col-actions{display:flex;gap:4px;}
.col-actions button{background:none;color:var(--text-on-dark);opacity:.5;font-size:13px;padding:4px 6px;}
.col-actions button:hover{opacity:1;}

/* === CARDS === */
.cards{min-height:30px;transition:background .2s;}
.card{background:var(--card);color:var(--card-text);border-radius:12px;padding:12px;margin-bottom:10px;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .15s ease;animation:fadeIn .2s ease;border-left:4px solid transparent;position:relative;}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.12);}
.card.priority-high-border{border-left-color:#e74c3c;}
.card.priority-medium-border{border-left-color:#f39c12;}
.card.priority-low-border{border-left-color:#2ecc71;}
.card.closed{opacity:.55;}
.card.closed .card-title{text-decoration:line-through;}
.card-badge-done{position:absolute;top:8px;right:8px;font-size:10px;background:#2ecc71;color:white;padding:2px 7px;border-radius:999px;font-weight:600;}
.card.late-warning{box-shadow:0 0 0 2px rgba(231,76,60,.4),0 2px 8px rgba(0,0,0,.08);}
.card.due-soon{box-shadow:0 0 0 2px rgba(243,156,18,.3),0 2px 8px rgba(0,0,0,.08);}
.card.dragging{opacity:.5;transform:rotate(2deg) scale(1.03);cursor:grabbing;}
.cards.drag-over{background:rgba(79,140,255,.08);border-radius:10px;}
.card-placeholder{height:50px;border:2px dashed rgba(128,128,128,.3);border-radius:10px;margin-bottom:10px;}
.card-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:6px;}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:6px;}
.card-date{font-size:11px;color:var(--card-muted);}
.card-date.late{color:#e74c3c;font-weight:600;}
.card-date.soon{color:#f39c12;font-weight:600;}
.card-priority{font-size:11px;font-weight:600;}
.priority-low{color:#2ecc71;}
.priority-medium{color:#f39c12;}
.priority-high{color:#e74c3c;}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.tag{font-size:10px;letter-spacing:.3px;text-transform:uppercase;font-weight:600;padding:2px 6px;border-radius:4px;color:white;}
.card-subtasks{font-size:11px;color:var(--card-muted);margin-top:4px;display:flex;align-items:center;gap:4px;}
.subtask-bar{height:4px;background:#e0e0e0;border-radius:2px;flex:1;max-width:60px;overflow:hidden;}
.subtask-fill{height:100%;background:var(--success);border-radius:2px;transition:width .3s;}
.card-comments-count{font-size:11px;color:var(--card-muted);margin-top:2px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* === BUTTONS === */
button{border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-weight:500;font-size:13px;transition:.15s ease;font-family:inherit;}
button:hover{opacity:.9;}
button:active{transform:scale(.97);}
button.primary{background:var(--primary);color:white;}
button.primary:hover{background:var(--primary-hover);}
button.danger{background:var(--danger);color:white;}
button.ghost{background:transparent;color:var(--text-on-dark);opacity:.6;}
button.ghost:hover{opacity:1;background:rgba(128,128,128,.1);}
.add-card-btn{width:100%;margin-top:8px;background:rgba(128,128,128,.1);color:var(--text-on-dark);opacity:.7;}
.add-card-btn:hover{opacity:1;background:rgba(128,128,128,.15);}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-content{background:var(--modal-bg);color:var(--modal-text);padding:24px;width:500px;max-width:94vw;max-height:90vh;overflow-y:auto;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.3);transform:translateY(20px);transition:transform .2s;}
.modal-overlay.open .modal-content{transform:translateY(0);}
.modal-content h3{font-size:16px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--input-border);}
.modal-content label{font-size:12px;font-weight:600;margin-top:12px;display:block;color:#666;text-transform:uppercase;letter-spacing:.5px;}
.modal-content input,.modal-content textarea,.modal-content select{width:100%;margin-top:4px;padding:8px 10px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);font-family:inherit;font-size:13px;transition:.2s ease;color:var(--modal-text);}
.modal-content input:focus,.modal-content textarea:focus,.modal-content select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,140,255,.12);}
.modal-row{display:flex;gap:10px;}
.modal-row>div{flex:1;}
.modal-footer{margin-top:18px;display:flex;gap:8px;justify-content:space-between;}

/* === COMMENTS === */
.comments-history{margin-top:6px;display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;}
.comment-entry{background:var(--comment-bg);border-radius:8px;padding:8px 10px;font-size:12px;color:#555;}
.comment-date{font-size:10px;color:#999;font-weight:600;margin-bottom:3px;}
.comment-text{white-space:pre-wrap;word-break:break-word;line-height:1.4;}

/* === SUBTASKS in modal === */
.subtask-list{margin-top:6px;}
.subtask-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px;}
.subtask-item input[type="checkbox"]{width:auto;margin:0;}
.subtask-item .subtask-label{flex:1;}
.subtask-item .subtask-label.done{text-decoration:line-through;opacity:.5;}
.subtask-item button{padding:2px 6px;font-size:11px;background:none;color:#999;}
.subtask-item button:hover{color:var(--danger);}
.add-subtask{display:flex;gap:6px;margin-top:6px;}
.add-subtask input{flex:1;}

/* === LABELS in modal === */
.labels-container{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.label-toggle{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;opacity:.5;transition:.15s;}
.label-toggle.active{opacity:1;border-color:rgba(0,0,0,.2);}

/* === TOAST === */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:#333;color:white;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;max-width:320px;}
.toast.error{background:#e74c3c;}
.toast.success{background:#2ecc71;}
.toast.warning{background:#f39c12;color:#333;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* === DASHBOARD === */
.dashboard-overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.dashboard-overlay.open{opacity:1;pointer-events:all;}
.dashboard-panel{background:var(--modal-bg);color:var(--modal-text);border-radius:16px;padding:28px;width:640px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.3);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:16px 0;}
.stat-card{background:var(--input-bg);border-radius:12px;padding:14px;text-align:center;}
.stat-value{font-size:28px;font-weight:700;line-height:1;}
.stat-label{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
.stat-bar-group{margin:16px 0;}
.stat-bar{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px;}
.stat-bar-track{flex:1;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .5s;}

/* === AUTH === */
#authScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2000;background:linear-gradient(135deg,#141e30,#243b55);}
#authScreen>div{background:white;padding:28px;border-radius:16px;width:340px;max-width:90vw;box-shadow:0 25px 60px rgba(0,0,0,.4);color:#333;}
#authScreen h2{margin-bottom:14px;font-weight:600;color:#222;font-size:20px;}
#authScreen input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin:5px 0;display:block;font-size:14px;font-family:inherit;}
#authScreen input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,140,255,.12);}
#loadingScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1500;background:rgba(15,32,39,.9);}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);border-top-color:#4f8cff;border-radius:50%;animation:spin .6s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg)}}
#config-banner{background:#ff5c5c;color:white;text-align:center;padding:10px;font-size:13px;font-weight:600;}
.hidden{display:none!important}

/* === ACTIVITY LOG === */
.activity-overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(6px);z-index:200;display:flex;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.activity-overlay.open{opacity:1;pointer-events:all;}
.activity-panel{background:var(--modal-bg);color:var(--modal-text);width:360px;max-width:90vw;height:100%;overflow-y:auto;padding:20px;box-shadow:-10px 0 40px rgba(0,0,0,.2);animation:slideIn .25s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.activity-item{padding:10px 0;border-bottom:1px solid var(--input-border);font-size:12px;line-height:1.5;}
.activity-time{color:#999;font-size:10px;}
.activity-action{margin-top:2px;}

/* === WIP SETTINGS === */
.wip-input{width:50px!important;display:inline-block!important;text-align:center;padding:4px!important;margin-left:6px!important;}

/* === ARCHIVE PANEL === */
.archive-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--input-border);}

/* === RESPONSIVE === */
@media(max-width:640px){
  header{padding:10px 14px;font-size:16px;}
  .header-right{gap:6px;}
  .toolbar{padding:8px 14px;gap:6px;}
  .toolbar input[type="text"]{width:140px;}
  .board{padding:12px;gap:12px;}
  .column{width:calc(100vw - 36px);min-width:calc(100vw - 36px);}
  .modal-content{padding:18px;}
  .modal-row{flex-direction:column;gap:6px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .dashboard-panel{padding:18px;}
}
</style>
</head>
<body>

<div id="config-banner" class="hidden">
  ⚠️ Firebase non configuré — modifiez la section CONFIGURATION FIREBASE
</div>
<div id="loadingScreen"><div class="spinner"></div> Chargement…</div>
<div id="authScreen" style="display:none">
  <div>
    <h2>🔐 Connexion</h2>
    <input id="auth-email" placeholder="Email" type="email">
    <input id="auth-password" type="password" placeholder="Mot de passe">
    <button onclick="login()" style="width:100%;background:var(--primary);color:white;margin-top:10px;padding:10px;font-size:14px;border:none;border-radius:8px;cursor:pointer">Se connecter</button>
    <p id="auth-error" style="color:#e74c3c;font-size:12px;margin-top:8px"></p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="header-left">
      <span>🧩 Trellow</span>
    </div>
    <div class="header-right">
      <button onclick="toggleDashboard()" class="ghost" title="Tableau de bord">📊</button>
      <button onclick="toggleActivity()" class="ghost" title="Activité">📋</button>
      <button onclick="exportBoard()" class="ghost" title="Exporter">⬇️</button>
      <button onclick="toggleArchive()" class="ghost" title="Archives" id="archive-btn">🗄️</button>
      <button onclick="toggleTheme()" class="ghost" title="Thème" id="theme-btn">🌙</button>
      <span id="header-user"></span>
      <button onclick="logout()" class="primary" style="font-size:12px;padding:6px 12px;">Déconnexion</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="filter-group">
      <input type="text" id="search-input" placeholder="🔍 Rechercher…" oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <label>Priorité</label>
      <select id="filter-priority" onchange="applyFilters()">
        <option value="">Toutes</option>
        <option value="high">Haute</option>
        <option value="medium">Moyenne</option>
        <option value="low">Basse</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Label</label>
      <select id="filter-label" onchange="applyFilters()">
        <option value="">Tous</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Statut</label>
      <select id="filter-status" onchange="applyFilters()">
        <option value="">Tous</option>
        <option value="open">Ouvert</option>
        <option value="closed">Clos</option>
        <option value="late">En retard</option>
      </select>
    </div>
    <div class="filter-group">
      <label>
        <input type="checkbox" id="filter-hide-closed" onchange="applyFilters()" style="width:auto;margin:0">
        Masquer clos
      </label>
    </div>
  </div>

  <div class="board" id="board"></div>
  <div class="board-footer">
    <button onclick="addColumn()" class="primary">+ Ajouter une colonne</button>
  </div>
</div>

<!-- CARD MODAL -->
<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <h3 id="modal-header">Détails de la carte</h3>

    <label>Titre</label>
    <input id="modal-titre" placeholder="Titre de la carte" maxlength="200">

    <div class="modal-row">
      <div>
        <label>Priorité</label>
        <select id="modal-priority">
          <option value="low">🟢 Basse</option>
          <option value="medium">🟡 Moyenne</option>
          <option value="high">🔴 Haute</option>
        </select>
      </div>
      <div>
        <label>Date limite</label>
        <input type="date" id="modal-date">
      </div>
      <div>
        <label>Créée le</label>
        <input type="date" id="modal-date-creation" disabled>
      </div>
    </div>

    <label>Labels</label>
    <div id="modal-labels" class="labels-container"></div>

    <label>Sous-tâches</label>
    <div id="modal-subtasks" class="subtask-list"></div>
    <div class="add-subtask">
      <input type="text" id="subtask-input" placeholder="Nouvelle sous-tâche…" maxlength="150" onkeydown="if(event.key==='Enter')addSubtask()">
      <button onclick="addSubtask()" class="primary" style="font-size:11px;padding:6px 10px;">+</button>
    </div>

    <label>Commentaires</label>
    <div id="modal-comments-history" class="comments-history"></div>
    <textarea id="modal-new-comment" placeholder="Ajouter un commentaire…" rows="2" style="margin-top:6px" maxlength="2000"></textarea>

    <div style="margin-top:10px">
      <input type="checkbox" id="modal-closed" style="width:auto">
      <label for="modal-closed" style="display:inline;margin-left:4px;text-transform:none;font-size:13px;color:var(--modal-text)">Marquer comme terminé</label>
    </div>

    <div class="modal-footer">
      <button onclick="confirmDeleteCard()" class="danger">🗑️ Supprimer</button>
      <div style="display:flex;gap:6px;">
        <button onclick="duplicateCard()" class="ghost" style="color:var(--modal-text)">📋 Dupliquer</button>
        <button onclick="closeModal()" class="primary">✓ Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard-overlay" onclick="if(event.target===this)toggleDashboard()">
  <div class="dashboard-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:18px;">📊 Tableau de bord</h3>
      <button onclick="toggleDashboard()" class="ghost" style="color:var(--modal-text)">✕</button>
    </div>
    <div id="dashboard-content"></div>
  </div>
</div>

<!-- ACTIVITY LOG -->
<div id="activity" class="activity-overlay" onclick="if(event.target===this)toggleActivity()">
  <div class="activity-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:18px;">📋 Activité récente</h3>
      <button onclick="toggleActivity()" class="ghost" style="color:var(--modal-text)">✕</button>
    </div>
    <div id="activity-content"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toasts"></div>

<script type="module">

// ============================================================
//  👉 NE PAS MODIFIER — valeurs injectées par GitHub Actions
const FIREBASE_CONFIG = {
  apiKey:      "%%FIREBASE_API_KEY%%",
  authDomain:  "%%FIREBASE_AUTH_DOMAIN%%",
  databaseURL: "%%FIREBASE_DB_URL%%",
  projectId:   "%%FIREBASE_PROJECT_ID%%",
};
// ============================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, onValue, enableLogging }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

let app, auth, db;
try {
  app  = initializeApp(FIREBASE_CONFIG);
  auth = getAuth(app);
  db   = getDatabase(app, FIREBASE_CONFIG.databaseURL);
} catch(e) {
  console.error("Firebase init error:", e);
  document.getElementById("config-banner").classList.remove("hidden");
  document.getElementById("loadingScreen").style.display = "none";
}

// ============ UTILITIES ============
function escapeHTML(str=""){
  const d=document.createElement("div"); d.textContent=str; return d.innerHTML;
}
function formatDate(iso){ return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function todayISO(){ return new Date().toISOString(); }
function todayDate(){ return new Date().toISOString().split("T")[0]; }

function formatAuthor(email=""){
  if(!email) return "";
  const local=email.split("@")[0];
  return local.split(".").map(p=>p.replace(/(?:^|-)(\w)/g,(_,c)=>c.toUpperCase())).join(" ");
}

function toast(msg, type="info"){
  const t=document.createElement("div");
  t.className="toast "+(type||"");
  t.textContent=msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

function daysUntil(dateStr){
  if(!dateStr) return Infinity;
  const d=new Date(dateStr), now=new Date();
  now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.ceil((d-now)/(1000*60*60*24));
}

// ============ FIREBASE SYNC ============
function save(){
  if(!currentUser||!db) return;
  try{
    set(ref(db,"boards/shared"),boardData);
  } catch(e){
    toast("Erreur de sauvegarde","error");
    console.error(e);
  }
}

function saveActivity(){
  if(!currentUser||!db) return;
  try{
    set(ref(db,"activity"),activityLog.slice(-100));
  } catch(e){ console.error(e); }
}

function logActivity(action, detail=""){
  const entry={
    date:todayISO(),
    user:currentUser?currentUser.email:"",
    action,
    detail
  };
  activityLog.push(entry);
  if(activityLog.length>100) activityLog=activityLog.slice(-100);
  saveActivity();
}

function startListening(){
  if(unsubscribe) unsubscribe();

  const boardRef=ref(db,"boards/shared");
  const actRef=ref(db,"activity");

  unsubscribe=onValue(boardRef,snapshot=>{
    const data=snapshot.val();
    boardData=data||[{title:"À faire",cards:[]},{title:"En cours",cards:[]},{title:"Terminé",cards:[]}];
    // Migrate old data
    boardData.forEach(col=>{
      if(!col.cards) col.cards=[];
      col.cards.forEach(card=>{
        if(!card.comments) card.comments=[];
        if(!card.labels) card.labels=card.users||[];
        if(!card.subtasks) card.subtasks=[];
        if(card.commentaires){
          card.comments.push({text:card.commentaires,date:card.commentDate||card.createdAt,author:""});
          delete card.commentaires; delete card.commentDate;
        }
      });
    });
    if(!modalOpen) render();
  }, err=>{
    toast("Connexion Firebase perdue","error");
    console.error(err);
  });

  onValue(actRef,snap=>{
    activityLog=snap.val()||[];
  });
}

// ============ FILTERS ============
window.applyFilters=()=>{
  currentFilters={
    search:document.getElementById("search-input").value.toLowerCase().trim(),
    priority:document.getElementById("filter-priority").value,
    label:document.getElementById("filter-label").value,
    status:document.getElementById("filter-status").value,
    hideClosed:document.getElementById("filter-hide-closed").checked
  };
  render();
};

function cardMatchesFilters(card){
  const f=currentFilters;
  if(f.search){
    const s=f.search;
    const titleMatch=(card.titre||"").toLowerCase().includes(s);
    const commentMatch=(card.comments||[]).some(c=>(c.text||"").toLowerCase().includes(s));
    const subtaskMatch=(card.subtasks||[]).some(st=>(st.text||"").toLowerCase().includes(s));
    if(!titleMatch&&!commentMatch&&!subtaskMatch) return false;
  }
  if(f.priority && card.priority!==f.priority) return false;
  if(f.label && !(card.labels||[]).includes(parseInt(f.label))) return false;
  if(f.status==="open" && card.closed) return false;
  if(f.status==="closed" && !card.closed) return false;
  if(f.status==="late" && daysUntil(card.dueDate)>=0) return false;
  if(f.hideClosed && card.closed) return false;
  return true;
}

// ============ RENDER ============
const board=document.getElementById("board");

function render(){
  board.innerHTML="";
  boardData.forEach((col,ci)=>{
    const colEl=document.createElement("div");
    colEl.className="column";

    const visibleCards=(col.cards||[]).filter(c=>cardMatchesFilters(c));
    const totalCards=(col.cards||[]).length;
    const wipLimit=col.wipLimit||0;
    const overWip=wipLimit>0 && visibleCards.filter(c=>!c.closed).length>wipLimit;

    colEl.innerHTML=`
      <div class="col-header">
        <input value="${escapeHTML(col.title)}" onchange="updateColTitle(${ci},this.value)" title="Renommer la colonne">
        <span class="card-counter ${overWip?'wip-warning':''}" title="${wipLimit?'Limite WIP: '+wipLimit:''}">
          ${visibleCards.length}${wipLimit?'/'+wipLimit:''}
        </span>
        <div class="col-actions">
          <button onclick="setWipLimit(${ci})" title="Limite WIP">⚙️</button>
          <button onclick="deleteColumn(${ci})" title="Supprimer la colonne">🗑️</button>
        </div>
      </div>
      <div class="cards" data-col="${ci}"></div>
      <button class="add-card-btn" onclick="addCard(${ci})">+ Carte</button>
    `;

    const cardsDiv=colEl.querySelector(".cards");

    // Drag & drop
    cardsDiv.addEventListener("dragover",e=>{
      e.preventDefault();cardsDiv.classList.add("drag-over");
      const placeholder=document.querySelector(".card-placeholder")||createPlaceholder();
      const after=[...cardsDiv.querySelectorAll(".card:not(.dragging)")].find(card=>
        e.clientY<card.getBoundingClientRect().top+card.getBoundingClientRect().height/2
      );
      after?cardsDiv.insertBefore(placeholder,after):cardsDiv.appendChild(placeholder);
    });
    cardsDiv.addEventListener("dragleave",e=>{
      if(!cardsDiv.contains(e.relatedTarget)){
        cardsDiv.classList.remove("drag-over");
        document.querySelectorAll(".card-placeholder").forEach(p=>p.remove());
      }
    });
    cardsDiv.addEventListener("drop",e=>{
      cardsDiv.classList.remove("drag-over");
      document.querySelectorAll(".card-placeholder").forEach(p=>p.remove());
      if(!draggedData) return;
      const card=boardData[draggedData.c].cards.splice(draggedData.i,1)[0];
      let newIndex=[...cardsDiv.querySelectorAll(".card")].length;
      const ph=[...cardsDiv.children].findIndex(c=>c.classList.contains("card-placeholder"));
      if(ph!==-1) newIndex=ph;
      if(!boardData[ci].cards) boardData[ci].cards=[];
      boardData[ci].cards.splice(newIndex,0,card);
      if(draggedData.c!==ci){
        logActivity("Déplacement","\""+escapeHTML(card.titre||"Sans titre")+"\" → "+escapeHTML(col.title));
      }
      save();render();
    });

    // Sort by creation date (newest first), closed at bottom
    const sorted=[...visibleCards].sort((a,b)=>{
      if(a.closed!==b.closed) return a.closed?1:-1;
      return new Date(b.createdAt||0)-new Date(a.createdAt||0);
    });

    sorted.forEach(card=>{
      const realIndex=boardData[ci].cards.findIndex(x=>x.id===card.id);
      const d=document.createElement("div");
      d.className="card";
      d.draggable=true;
      d.dataset.drag=JSON.stringify({c:ci,i:realIndex});
      d.onclick=()=>openModal(ci,card.id);

      // Priority border
      d.classList.add("priority-"+(card.priority||"low")+"-border");

      // Closed
      if(card.closed) d.classList.add("closed");

      // Due date warning
      const days=daysUntil(card.dueDate);
      if(!card.closed && card.dueDate){
        if(days<0) d.classList.add("late-warning");
        else if(days<=3) d.classList.add("due-soon");
      }

      const assignedLabels=(card.labels||[]).map(lid=>{
        const l=labels.find(x=>x.id===lid);
        return l?`<span class="tag" style="background:${l.color}">${escapeHTML(l.name)}</span>`:"";
      }).join("");

      const priorityLabel=card.priority==="high"?"Haute":card.priority==="medium"?"Moyenne":"Basse";

      // Subtasks progress
      const subtasks=card.subtasks||[];
      const doneCount=subtasks.filter(s=>s.done).length;
      const subtasksHTML=subtasks.length>0?`
        <div class="card-subtasks">
          ☑ ${doneCount}/${subtasks.length}
          <div class="subtask-bar"><div class="subtask-fill" style="width:${subtasks.length?Math.round(doneCount/subtasks.length*100):0}%"></div></div>
        </div>`:"";

      const commentsCount=(card.comments||[]).length;
      const commentsHTML=commentsCount>0?`<span class="card-comments-count">💬 ${commentsCount}</span>`:"";

      let dueDateHTML="";
      if(card.dueDate){
        const cls=days<0?"late":days<=3?"soon":"";
        dueDateHTML=`<span class="card-date ${cls}">📅 ${new Date(card.dueDate).toLocaleDateString("fr-FR")}</span>`;
      }

      d.innerHTML=`
        ${card.closed?'<span class="card-badge-done">✔ Terminé</span>':''}
        ${card.titre?`<div class="card-title">${escapeHTML(card.titre)}</div>`:'<div class="card-title" style="opacity:.4">Sans titre</div>'}
        ${assignedLabels?`<div class="card-tags">${assignedLabels}</div>`:''}
        ${subtasksHTML}
        <div class="card-meta">
          ${dueDateHTML}
          <span class="card-priority priority-${card.priority||'low'}">⚡${priorityLabel}</span>
          ${commentsHTML}
        </div>
      `;
      cardsDiv.appendChild(d);
    });

    board.appendChild(colEl);
  });
}

const modal=document.getElementById("modal");
const modalTitre=document.getElementById("modal-titre");
const modalDate=document.getElementById("modal-date");
const modalDateCreation=document.getElementById("modal-date-creation");
const modalPriority=document.getElementById("modal-priority");
const modalLabels=document.getElementById("modal-labels");
const modalClosed=document.getElementById("modal-closed");
const modalNewComment=document.getElementById("modal-new-comment");
const modalCommentsHistory=document.getElementById("modal-comments-history");
const modalSubtasks=document.getElementById("modal-subtasks");

window.openModal=(ci,cardId)=>{
  activeCol=ci;
  activeCard=boardData[ci].cards.findIndex(c=>c.id===cardId);
  if(activeCard===-1) return;
  const c=boardData[ci].cards[activeCard];

  modalOpen=true;
  modal.classList.add("open");

  modalTitre.value=c.titre||"";
  modalNewComment.value="";
  modalDate.value=c.dueDate||"";
  modalDateCreation.value=c.createdAt?new Date(c.createdAt).toISOString().split("T")[0]:"";
  modalPriority.value=c.priority||"low";
  modalClosed.checked=!!c.closed;

  renderModalLabels(c);
  renderModalSubtasks(c);
  renderCommentsHistory(c.comments);

  modalTitre.focus();
};

window.closeModal=()=>{
  if(activeCol!==undefined && activeCard!==undefined && boardData[activeCol] && boardData[activeCol].cards[activeCard]){
    const c=boardData[activeCol].cards[activeCard];

    // Save comment
    const text=modalNewComment.value.trim();
    if(text){
      if(!c.comments) c.comments=[];
      c.comments.push({text,date:todayISO(),author:currentUser?currentUser.email:""});
      logActivity("Commentaire",escapeHTML(c.titre||"Sans titre"));
    }

    // Validate
    const titre=modalTitre.value.trim();
    c.titre=titre;
    c.dueDate=modalDate.value;
    c.priority=modalPriority.value;

    const wasClosed=c.closed;
    c.closed=modalClosed.checked;
    if(!wasClosed && c.closed) logActivity("Clôture",escapeHTML(c.titre||"Sans titre"));

    save();
  }

  modalOpen=false;
  modal.classList.remove("open");
  render();
};

window.confirmDeleteCard=()=>{
  if(activeCol===undefined||activeCard===undefined) return;
  const c=boardData[activeCol].cards[activeCard];
  const titre=c.titre||"Sans titre";
  if(confirm(`Supprimer définitivement la carte "${titre}" ?`)){
    logActivity("Suppression carte",escapeHTML(titre));
    boardData[activeCol].cards.splice(activeCard,1);
    save();
    modalOpen=false;
    modal.classList.remove("open");
    render();
    toast("Carte supprimée","success");
  }
};

// ============ LABELS IN MODAL ============
function renderModalLabels(card){
  modalLabels.innerHTML="";
  labels.forEach(l=>{
    const active=(card.labels||[]).includes(l.id);
    const el=document.createElement("span");
    el.className="label-toggle"+(active?" active":"");
    el.style.background=l.color+(active?"":"33");
    el.style.color=active?"white":"inherit";
    el.textContent=l.name;
    el.onclick=()=>{
      if(!card.labels) card.labels=[];
      if(card.labels.includes(l.id)){
        card.labels=card.labels.filter(x=>x!==l.id);
      } else {
        card.labels.push(l.id);
      }
      save();
      renderModalLabels(card);
    };
    modalLabels.appendChild(el);
  });
}

// ============ SUBTASKS IN MODAL ============
function renderModalSubtasks(card){
  if(!card.subtasks) card.subtasks=[];
  modalSubtasks.innerHTML="";

      <button onclick="removeSubtask(${i})">✕</button>

window.toggleSubtask=(i,checked)=>{

  renderModalSubtasks(c);
};

window.removeSubtask=i=>{
  const c=boardData[activeCol].cards[activeCard];
  c.subtasks.splice(i,1);

  renderModalSubtasks(c);
};

window.addSubtask=()=>{

  content.innerHTML=`

      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--success)">${closed}</div>
        <div class="stat-label">Terminées</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--danger)">${late}</div>
        <div class="stat-label">En retard</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--warning)">${dueSoon}</div>
        <div class="stat-label">Échéance < 3j</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:#e74c3c">${highP}</div>
        <div class="stat-label">Priorité haute</div>
      </div>
    </div>

    <h4 style="margin:16px 0 8px;font-size:13px;color:#888;">Répartition par colonne</h4>
    <div class="stat-bar-group">
      ${colStats.map(c=>`
        <div class="stat-bar">
          <span style="min-width:100px;font-weight:500">${escapeHTML(c.name)}</span>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${Math.round(c.total/maxCount*100)}%;background:var(--primary)"></div></div>
          <span style="min-width:30px;text-align:right">${c.count}</span>
        </div>`).join("")}
    </div>

    <h4 style="margin:16px 0 8px;font-size:13px;color:#888;">Répartition par label</h4>
    <div class="stat-bar-group">
      ${Object.values(labelCounts).map(l=>`
        <div class="stat-bar">
          <span style="min-width:100px;font-weight:500">${escapeHTML(l.name)}</span>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${Math.round(l.count/maxLabelCount*100)}%;background:${l.color}"></div></div>
          <span style="min-width:30px;text-align:right">${l.count}</span>
        </div>`).join("")}
    </div>

    ${total>0?`<div style="margin-top:16px;text-align:center;font-size:12px;color:#888;">
      Taux de complétion : <b>${Math.round(closed/total*100)}%</b>
    </div>`:""}
  `;
}

// ============ ACTIVITY LOG ============
window.toggleActivity=()=>{
  const el=document.getElementById("activity");
  const isOpen=el.classList.contains("open");
  if(!isOpen) renderActivity();
  el.classList.toggle("open");
};

function renderActivity(){
  const content=document.getElementById("activity-content");
  if(!activityLog||activityLog.length===0){
    content.innerHTML='<p style="font-size:13px;color:#888;font-style:italic">Aucune activité enregistrée.</p>';
    return;
  }
  const sorted=[...activityLog].reverse();
  content.innerHTML=sorted.map(a=>`
    <div class="activity-item">
      <div class="activity-time">📅 ${formatDate(a.date)} — ${escapeHTML(formatAuthor(a.user))}</div>
      <div class="activity-action"><b>${escapeHTML(a.action)}</b>${a.detail?' : '+escapeHTML(a.detail):''}</div>
    </div>`).join("");
}

// ============ EXPORT ============
window.exportBoard=()=>{
  const data={
    exportDate:todayISO(),
    columns:boardData.map(col=>({
      title:col.title,
      wipLimit:col.wipLimit||0,
      cards:(col.cards||[]).map(c=>({
        titre:c.titre,
        priority:c.priority,
        dueDate:c.dueDate,
        createdAt:c.createdAt,
        closed:c.closed,
        labels:(c.labels||[]).map(lid=>{
          const l=labels.find(x=>x.id===lid);
          return l?l.name:"";
        }).filter(Boolean),
        subtasks:c.subtasks||[],
        comments:(c.comments||[]).map(cm=>({
          text:cm.text,
          date:cm.date,
          author:formatAuthor(cm.author)
        }))
      }))
    }))
  };

  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`trellow-export-${todayDate()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Export téléchargé","success");
};

// ============ ARCHIVE VIEW ============
window.toggleArchive=()=>{
  showArchived=!showArchived;
  const btn=document.getElementById("archive-btn");
  if(showArchived){
    document.getElementById("filter-status").value="closed";
    applyFilters();
    btn.style.background="var(--primary)";
    toast("Affichage des cartes terminées","info");
  } else {
    document.getElementById("filter-status").value="";
    applyFilters();
    btn.style.background="";
  }
};

// ============ TOGGLE THEME (exposed) ============
window.toggleTheme=toggleTheme;
window.toggleDashboard=window.toggleDashboard;
window.toggleActivity=window.toggleActivity;
window.exportBoard=window.exportBoard;
window.toggleArchive=window.toggleArchive;

</script>
