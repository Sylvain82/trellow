<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Trellow</title>
<style>
:root{
  --bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  --column-bg: rgba(255,255,255,0.08);
  --column-border: rgba(255,255,255,0.12);
  --card:#ffffff;
  --primary:#4f8cff;
  --danger:#ff5c5c;
  --success:#2ecc71;
  --radius:14px;
  --shadow:0 10px 30px rgba(0,0,0,.25);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial;color:white;}
header{backdrop-filter:blur(12px);background:rgba(0,0,0,.35);padding:18px 30px;font-size:20px;font-weight:600;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);}
.board{display:flex;gap:20px;padding:30px;overflow-x:auto;}
.board-footer{padding:20px;}
.board::-webkit-scrollbar{height:10px;}
.board::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:999px;}
.column{background:var(--column-bg);border:1px solid var(--column-border);width:320px;border-radius:var(--radius);padding:14px;flex-shrink:0;backdrop-filter:blur(8px);box-shadow:var(--shadow);transition:.2s ease;}
.column:hover{transform:translateY(-3px);}
.column input{width:100%;border:none;background:transparent;font-weight:600;font-size:16px;padding:6px;margin-bottom:12px;color:white;}
.column input:focus{outline:none;border-bottom:1px solid var(--primary);}
.cards{min-height:20px;}
.card{background:var(--card);color:#333;border-radius:12px;padding:14px;margin-bottom:14px;cursor:grab;box-shadow:0 6px 20px rgba(0,0,0,.15);transition:all .2s ease;animation:fadeIn .25s ease;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.18);}
.card strong{display:block;font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.4;}
.card.closed{opacity:.5;position:relative;}
.card.closed::after{content:"✔ Terminée";position:absolute;top:10px;right:10px;font-size:11px;background:#2ecc71;color:white;padding:4px 8px;border-radius:999px;}
.card.dragging{opacity:.6;transform:rotate(2deg) scale(1.04);box-shadow:0 25px 60px rgba(0,0,0,.35);cursor:grabbing;}
.cards.drag-over{background:rgba(255,255,255,.06);border-radius:12px;}
.card-placeholder{height:60px;border:2px dashed rgba(255,255,255,.4);border-radius:12px;margin-bottom:14px;animation:pulse 1s infinite alternate;}
@keyframes pulse{from{opacity:.4}to{opacity:.8}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tag{font-size:10px;letter-spacing:.4px;text-transform:uppercase;font-weight:600;padding:2px 6px;border-radius:4px;color:white;}
.priority-low{color:#2ecc71;font-weight:600;}
.priority-medium{color:#f39c12;font-weight:600;}
.priority-high{color:#e74c3c;font-weight:600;}
button{border:none;border-radius:10px;padding:8px 14px;cursor:pointer;font-weight:500;transition:.15s ease;}
button:hover{transform:translateY(-2px);opacity:.95;}
button.primary{background:var(--primary);color:white;}
button.danger{background:var(--danger);color:white;}
button:active{transform:scale(.96);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
.modal-content{background:white;padding:28px;width:460px;max-height:90vh;overflow-y:auto;border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.45);color:#333;}
.modal-content label{font-size:13px;font-weight:600;margin-top:12px;display:block;}
.modal-content input,.modal-content textarea,.modal-content select{width:100%;margin-top:6px;padding:8px 10px;border-radius:10px;border:1px solid #ddd;transition:.2s ease;}
.modal-content input:focus,.modal-content textarea:focus,.modal-content select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,140,255,.15);}
.hidden{display:none}
.card-counter{background:rgba(255,255,255,.15);padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600;min-width:24px;text-align:center;transition:transform .2s ease;}
.card-counter.bump{transform:scale(1.25);}
#modal-comments-history{margin-top:6px;display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;}
.comment-entry{background:#f4f5f7;border-radius:8px;padding:8px 10px;font-size:13px;color:#444;}
.comment-entry-date{font-size:11px;color:#999;margin-bottom:4px;font-weight:600;}
.comment-entry-text{white-space:pre-wrap;word-break:break-word;}

/* AUTH */
#authScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2000;background:linear-gradient(135deg,#141e30,#243b55);}
#authScreen>div{background:white;padding:30px;border-radius:18px;width:340px;box-shadow:0 30px 80px rgba(0,0,0,.4);color:#333;}
#authScreen h2{margin-top:0;margin-bottom:16px;font-weight:600;color:#222;}
#authScreen input{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin:6px 0;display:block;}

/* LOADING */
#loadingScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1500;background:rgba(15,32,39,.85);font-size:18px;font-weight:600;letter-spacing:1px;}
.spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,.2);border-top-color:#4f8cff;border-radius:50%;animation:spin .7s linear infinite;margin-right:14px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ⚠️ CONFIG BANNER */
#config-banner{background:#ff5c5c;color:white;text-align:center;padding:12px;font-size:14px;font-weight:600;}
</style>
</head>
<body>

<!-- BANNIERE SI PAS CONFIGURE -->
<div id="config-banner" class="hidden">
  ⚠️ Firebase non configuré — modifiez la section CONFIGURATION FIREBASE en haut du fichier HTML
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div> Chargement…
</div>

<!-- AUTH -->
<div id="authScreen" style="display:none">
  <div>
    <h2>🔐 Connexion</h2>
    <input id="auth-email" placeholder="Email" type="email">
    <input id="auth-password" type="password" placeholder="Mot de passe">
    <button onclick="login()" style="width:100%;background:#3498db;color:white;margin-top:10px">Se connecter</button>
    <hr>
    <button onclick="register()" style="width:100%;background:#2ecc71;color:white;margin-top:6px">Créer un compte</button>
    <p id="auth-error" style="color:red;font-size:13px;margin-top:8px"></p>
  </div>
</div>

<header>
  🧩 Trellow
  <div style="display:flex;align-items:center;gap:12px">
    <span id="header-user" style="font-size:13px;opacity:.7"></span>
    <button onclick="logout()" class="primary">🚪 Déconnexion</button>
  </div>
</header>

<div class="board" id="board"></div>
<div class="board-footer">
  <button onclick="addColumn()" class="primary">+ Ajouter une colonne</button>
</div>

<!-- MODALE -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <label>Assignés</label>
    <div id="modal-users"></div>
    <label>Date création</label>
    <input type="date" id="modal-date-creation" disabled>
    <label>Date limite</label>
    <input type="date" id="modal-date">
    <label>Priorité</label>
    <select id="modal-priority">
      <option value="low">Basse</option>
      <option value="medium">Moyenne</option>
      <option value="high">Haute</option>
    </select>
    <label>Titre</label>
    <input id="modal-titre" placeholder="Titre">
    <label>Commentaires</label>
    <div id="modal-comments-history"></div>
    <textarea id="modal-new-comment" placeholder="Ajouter un commentaire…" rows="3" style="margin-top:6px"></textarea>
    <div style="margin-top:10px">
      <input type="checkbox" id="modal-closed" style="width:auto">
      <label for="modal-closed" style="display:inline;margin-left:6px">Sujet clos</label>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button onclick="deleteCard()" class="danger">Supprimer</button>
      <button onclick="closeModal()" class="primary">Fermer</button>
    </div>
  </div>
</div>

<script type="module">

// ============================================================
//  ██████╗ ██████╗ ███╗   ██╗███████╗██╗ ██████╗
// ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
// ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
// ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
// ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
//  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
//
//  👉 REMPLISSEZ LES 3 VALEURS CI-DESSOUS AVEC VOS INFOS FIREBASE
//  (voir le guide PDF fourni avec ce fichier)
// ============================================================

const FIREBASE_CONFIG = {
  apiKey:            "VOTRE_API_KEY",           // ← à remplacer
  authDomain:        "VOTRE_PROJECT.firebaseapp.com", // ← à remplacer
  databaseURL:       "https://VOTRE_PROJECT-default-rtdb.europe-west1.firebasedatabase.app", // ← à remplacer
  projectId:         "VOTRE_PROJECT_ID",        // ← à remplacer
};

// ============================================================
//  FIN DE LA CONFIGURATION — ne pas modifier en dessous
// ============================================================

import { initializeApp }            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, onValue }
                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Vérifie si la config a été remplie
const configured = FIREBASE_CONFIG.apiKey !== "VOTRE_API_KEY";
if (!configured) {
  document.getElementById("config-banner").classList.remove("hidden");
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("authScreen").style.display = "flex";
}

const app  = configured ? initializeApp(FIREBASE_CONFIG) : null;
const auth = configured ? getAuth(app) : null;
const db   = configured ? getDatabase(app) : null;

// ── Helpers ──────────────────────────────────────────────────
function escapeHTML(str=""){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function formatDate(iso){
  return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function todayISO(){ return new Date().toISOString(); }

// ── Auth UI ───────────────────────────────────────────────────
const authScreen   = document.getElementById("authScreen");
const loadingScreen= document.getElementById("loadingScreen");
const authError    = document.getElementById("auth-error");
const headerUser   = document.getElementById("header-user");

function showError(m){ authError.textContent = m; }

window.login = async () => {
  const email = document.getElementById("auth-email").value;
  const pass  = document.getElementById("auth-password").value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    showError("Email ou mot de passe incorrect.");
  }
};

window.register = async () => {
  const email = document.getElementById("auth-email").value;
  const pass  = document.getElementById("auth-password").value;
  if (!email || !pass) return showError("Remplissez les deux champs.");
  if (pass.length < 6) return showError("Le mot de passe doit faire au moins 6 caractères.");
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    showError(e.code === "auth/email-already-in-use" ? "Cet email est déjà utilisé." : "Erreur : " + e.message);
  }
};

window.logout = async () => {
  await signOut(auth);
};

// ── App state ─────────────────────────────────────────────────
let currentUser = null;
let boardData   = [];
let activeCol, activeCard, activeCardEl;
let unsubscribe = null; // Firebase listener

const users = [
  {id:1, name:"Sellerie",   color:"#e74c3c"},
  {id:2, name:"Menuiserie", color:"#3498db"},
  {id:3, name:"Expliseat",  color:"#2ecc71"}
];

// ── Firebase save / load ──────────────────────────────────────
function save() {
  if (!currentUser || !db) return;
  const boardRef = ref(db, "boards/" + currentUser.uid);
  set(boardRef, boardData);
}

function startListening() {
  if (unsubscribe) unsubscribe();
  const boardRef = ref(db, "boards/" + currentUser.uid);
  unsubscribe = onValue(boardRef, snapshot => {
    const data = snapshot.val();
    boardData = data || [
      {title:"To Do",   cards:[]},
      {title:"Doing",   cards:[]},
      {title:"Done",    cards:[]}
    ];
    render();
  });
}

// ── Auth state listener ───────────────────────────────────────
if (configured) {
  onAuthStateChanged(auth, user => {
    loadingScreen.style.display = "none";
    if (user) {
      currentUser = user;
      headerUser.textContent = user.email;
      authScreen.style.display = "none";
      startListening();
    } else {
      currentUser = null;
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      boardData = [];
      authScreen.style.display = "flex";
    }
  });
} else {
  loadingScreen.style.display = "none";
}

// ── DOM refs ──────────────────────────────────────────────────
const modal               = document.getElementById("modal");
const modalTitre          = document.getElementById("modal-titre");
const modalDate           = document.getElementById("modal-date");
const modalDateCreation   = document.getElementById("modal-date-creation");
const modalPriority       = document.getElementById("modal-priority");
const modalUsers          = document.getElementById("modal-users");
const modalClosed         = document.getElementById("modal-closed");
const modalNewComment     = document.getElementById("modal-new-comment");
const modalCommentsHistory= document.getElementById("modal-comments-history");
const board               = document.getElementById("board");

// ── Render ────────────────────────────────────────────────────
function render(){
  board.innerHTML = "";
  boardData.forEach((col, ci) => {
    const c = document.createElement("div");
    c.className = "column";
    c.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div style="display:flex;align-items:center;gap:6px;flex:1">
          <input value="${escapeHTML(col.title)}" onchange="updateColTitle(${ci},this.value)">
          <span class="card-counter" data-count="${(col.cards||[]).length}">0</span>
        </div>
        <button onclick="deleteColumn(${ci})" style="color:white;padding:5px">❌</button>
      </div>
      <div class="cards"></div>
      <button onclick="addCard(${ci})" style="margin-top:8px">+ Carte</button>
    `;

    const cardsDiv = c.querySelector(".cards");

    cardsDiv.addEventListener("dragover", e => {
      e.preventDefault();
      cardsDiv.classList.add("drag-over");
      const after = [...cardsDiv.querySelectorAll(".card:not(.dragging)")]
        .find(card => e.clientY < card.getBoundingClientRect().top + card.getBoundingClientRect().height/2);
      after ? cardsDiv.insertBefore(placeholder, after) : cardsDiv.appendChild(placeholder);
    });
    cardsDiv.addEventListener("dragleave", e => {
      if (!cardsDiv.contains(e.relatedTarget)) cardsDiv.classList.remove("drag-over");
    });
    cardsDiv.addEventListener("drop", e => {
      cardsDiv.classList.remove("drag-over");
      const card = boardData[draggedData.c].cards.splice(draggedData.i, 1)[0];
      let newIndex = [...cardsDiv.children].indexOf(placeholder);
      if (newIndex === -1) newIndex = (boardData[ci].cards||[]).length;
      if (!boardData[ci].cards) boardData[ci].cards = [];
      boardData[ci].cards.splice(newIndex, 0, card);
      save(); render();
    });

    [...(col.cards||[])]
      .sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0))
      .forEach(card => {
        const realIndex = boardData[ci].cards.findIndex(x => x.id === card.id);
        const d = document.createElement("div");
        d.className = "card";
        d.draggable = true;
        d.dataset.drag = JSON.stringify({c:ci, i:realIndex});
        d.onclick = () => openModal(ci, card.id, d);
        if (card.closed) d.classList.add("closed");

        const assignedUsers = (card.users||[]).map(uid => {
          const u = users.find(x => x.id === uid);
          return u ? `<span class="tag" style="background:${u.color}">${u.name}</span>` : "";
        }).join(" ");

        const priorityLabel = card.priority==="high"?"Haute":card.priority==="medium"?"Moyenne":"Basse";
        const isLate = card.dueDate && new Date(card.dueDate) < new Date();

        const commentsHTML = (card.comments && card.comments.length > 0) ? `
          <div style="margin-top:6px;font-size:12px;background:#f4f5f7;padding:6px;border-radius:6px;">
            ${card.comments.map(cm => `
              <div style="margin-bottom:4px">
                <div style="font-size:11px;color:#888">📅 ${formatDate(cm.date)}${cm.author ? ` — <strong>${escapeHTML(cm.author)}</strong>` : ""}</div>
                <div style="color:#555">${escapeHTML(cm.text).replace(/\n/g,"<br>")}</div>
              </div>
            `).join('<div style="height:1px;background:rgba(0,0,0,.06);margin:4px 0"></div>')}
          </div>` : "";

        d.innerHTML = `
          ${card.titre ? `<strong>${escapeHTML(card.titre)}</strong>` : ""}
          <div style="margin-top:6px">${assignedUsers}</div>
          ${card.createdAt ? `<div style="margin-top:4px;font-size:11px;color:#888">Créé le ${new Date(card.createdAt).toLocaleDateString("fr-FR")}</div>` : ""}
          ${commentsHTML}
          ${card.dueDate ? `<div style="margin-top:4px;font-size:12px;color:${isLate?"#e74c3c":"#555"};font-weight:${isLate?"600":"normal"}">📅 ${new Date(card.dueDate).toLocaleDateString("fr-FR")}</div>` : ""}
          ${card.priority ? `<div class="priority-${card.priority}" style="font-size:12px;margin-top:4px">⚡ Priorité : ${priorityLabel}</div>` : ""}
        `;
        cardsDiv.appendChild(d);
      });

    board.appendChild(c);
  });
  animateCounters();
}

function animateCounters(){
  document.querySelectorAll(".card-counter").forEach(counter => {
    const target = parseInt(counter.dataset.count);
    const start  = parseInt(counter.textContent)||0;
    const t0     = performance.now();
    counter.classList.add("bump");
    function update(t){
      const p = Math.min((t-t0)/300,1);
      counter.textContent = Math.floor(start+(target-start)*p);
      if(p<1) requestAnimationFrame(update);
      else { counter.textContent=target; setTimeout(()=>counter.classList.remove("bump"),200); }
    }
    requestAnimationFrame(update);
  });
}

// ── Column actions ────────────────────────────────────────────
window.updateColTitle = (ci,v) => { boardData[ci].title=v; save(); };
window.addColumn      = ()    => { boardData.push({title:"Nouvelle colonne",cards:[]}); save(); };
window.deleteColumn   = ci   => {
  if(confirm("Supprimer cette colonne et toutes ses cartes ?")){ boardData.splice(ci,1); save(); }
};

// ── Card actions ──────────────────────────────────────────────
window.addCard = ci => {
  const card = { id:Date.now(), titre:"", comments:[], users:[], dueDate:"", createdAt:todayISO(), priority:"low", closed:false };
  if (!boardData[ci].cards) boardData[ci].cards = [];
  boardData[ci].cards.push(card);
  save();
  openModal(ci, card.id, null);
};

window.toggleUser = (id, chk) => {
  const c = boardData[activeCol].cards[activeCard];
  chk ? c.users.push(id) : c.users = c.users.filter(x=>x!==id);
  save();
};

function renderCommentsHistory(comments){
  if(!comments||comments.length===0){
    modalCommentsHistory.innerHTML=`<div style="font-size:12px;color:#aaa;font-style:italic">Aucun commentaire.</div>`;
    return;
  }
  modalCommentsHistory.innerHTML = comments.map(cm=>`
    <div class="comment-entry">
      <div class="comment-entry-date">📅 ${formatDate(cm.date)}${cm.author?` — <strong>${escapeHTML(cm.author)}</strong>`:""}</div>
      <div class="comment-entry-text">${escapeHTML(cm.text).replace(/\n/g,"<br>")}</div>
    </div>
  `).join("");
  modalCommentsHistory.scrollTop = modalCommentsHistory.scrollHeight;
}

window.openModal = (ci, cardId, el) => {
  activeCol  = ci;
  activeCard = boardData[ci].cards.findIndex(c=>c.id===cardId);
  activeCardEl = el;
  const c = boardData[ci].cards[activeCard];

  // Migration ancien format
  if (!c.comments) {
    c.comments = [];
    if (c.commentaires) {
      c.comments.push({text:c.commentaires, date:c.commentDate||c.createdAt, author:""});
      delete c.commentaires; delete c.commentDate; save();
    }
  }

  modal.classList.remove("hidden");
  modalTitre.value = c.titre||"";
  modalNewComment.value = "";
  modalDate.value = c.dueDate||"";
  modalDateCreation.value = c.createdAt ? new Date(c.createdAt).toISOString().split("T")[0] : "";
  modalPriority.value = c.priority||"low";
  modalClosed.checked = !!c.closed;
  renderCommentsHistory(c.comments);

  modalUsers.innerHTML = "";
  users.forEach(u => {
    modalUsers.innerHTML += `<label style="display:inline-flex;align-items:center;gap:6px;margin-right:12px">
      <input type="checkbox" style="width:auto" ${(c.users||[]).includes(u.id)?"checked":""}
      onchange="toggleUser(${u.id},this.checked)"> ${u.name}</label>`;
  });

  modalTitre.oninput     = e => { c.titre    = e.target.value; save(); };
  modalDate.onchange     = e => { c.dueDate  = e.target.value; save(); };
  modalPriority.onchange = e => { c.priority = e.target.value; save(); };
  modalClosed.onchange   = e => { c.closed   = e.target.checked; save(); };
};

window.closeModal = () => {
  if (activeCol !== undefined && activeCard !== undefined) {
    const text = modalNewComment.value.trim();
    if (text) {
      const c = boardData[activeCol].cards[activeCard];
      if (!c.comments) c.comments = [];
      c.comments.push({ text, date:todayISO(), author: currentUser ? currentUser.email : "" });
      save();
    }
  }
  modal.classList.add("hidden");
};

window.deleteCard = () => {
  boardData[activeCol].cards.splice(activeCard,1);
  save();
  modal.classList.add("hidden");
};

// ── Drag & Drop ───────────────────────────────────────────────
let draggedData = null;
const placeholder = document.createElement("div");
placeholder.className = "card-placeholder";

document.addEventListener("dragstart", e => {
  if (!e.target.classList.contains("card")) return;
  e.target.classList.add("dragging");
  draggedData = JSON.parse(e.target.dataset.drag);
  setTimeout(()=>{ e.target.style.display="none"; },0);
});
document.addEventListener("dragend", e => {
  if (!e.target.classList.contains("card")) return;
  e.target.classList.remove("dragging");
  e.target.style.display="block";
  placeholder.remove();
});

// ── Keyboard / outside click ──────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key==="Escape" && !modal.classList.contains("hidden")) closeModal();
});
modal.addEventListener("click", e => { if(e.target===modal) closeModal(); });

</script>
</body>
</html>
